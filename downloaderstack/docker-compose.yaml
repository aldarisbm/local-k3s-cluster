services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: vpn
    labels:
      - autoheal=true
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - FIREWALL_INPUT_PORTS=8080,7878,8989,9696 # Open ports for the whole stack
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${OVPN_USER}
      - OPENVPN_PASSWORD=${OVPN_PASSWORD}
      - SERVER_REGIONS=CA Toronto
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_STATUS_FILE=/tmp/gluetun/forwarded_port
      - TZ=America/New_York
      - FIREWALL_OUTBOUND_SUBNETS=10.0.0.0/24,172.16.0.0/12
    volumes:
      - gluetun_data:/tmp/gluetun
      - ./gluetun_config:/gluetun # Recommended to persist vpn config
    ports:
      - 8080:8080 # qBittorrent
      - 7878:7878 # Radarr
      - 8989:8989 # Sonarr
      - 9696:9696 # Prowlarr
    healthcheck:
      # Switch to a simple ping—it's more reliable for "is the internet alive?"
      test: [ "CMD-SHELL", "ping -c 1 8.8.8.8 || exit 1" ]
      interval: 45s        # Check every 30s instead of 10s
      timeout: 10s
      retries: 3           # Give it more chances before calling it "dead"
      start_period: 90s    # Wait 1 minute before starting checks (covers MTU discovery)

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    labels:
      - autoheal=true
    network_mode: "container:vpn" # Uses VPN network
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - WEBUI_PORT=8080
    volumes:
      - ./qbit_config:/config
      - /mnt/knightrider/data:/data # <--- THE HARDLINK KEY
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "ping -c 1 8.8.8.8 || exit 1" ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    labels:
      - autoheal=true
    network_mode: "container:vpn" # Optional: Keeps search traffic on VPN
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./prowlarr_config:/config
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "ping -c 1 8.8.8.8 || exit 1" ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    labels:
      - autoheal=true
    network_mode: "container:vpn"
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./radarr_config:/config
      - /mnt/knightrider/data:/data # <--- THE HARDLINK KEY
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "ping -c 1 8.8.8.8 || exit 1" ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    labels:
      - autoheal=true
    network_mode: "container:vpn"
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ./sonarr_config:/config
      - /mnt/knightrider/data:/data # <--- THE HARDLINK KEY
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "ping -c 1 8.8.8.8 || exit 1" ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    labels:
      - autoheal=true
    network_mode: "container:vpn" # Keep it on the VPN so the cookie matches the IP
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TZ=America/New_York
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8191 || exit 1" ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

  port-manager:
    image: snoringdragon/gluetun-qbittorrent-port-manager:latest
    container_name: port-manager
    network_mode: "container:vpn"
    restart: always
    environment:
      - QBITTORRENT_SERVER=localhost
      - QBITTORRENT_PORT=8080
      - QBITTORRENT_USER=${QBIT_USER}
      - QBITTORRENT_PASS=${QBIT_PASSWORD}
      - PORT_FORWARDED=/tmp/gluetun/forwarded_port
    volumes:
      - gluetun_data:/tmp/gluetun:ro
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
      qbittorrent:
        condition: service_started
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all # Tells it to watch everything with a healthcheck
      - AUTOHEAL_INTERVAL=60         # Check every 60 seconds
      - AUTOHEAL_START_PERIOD=300    # Wait 5 mins after boot before starting to "kill" things
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  gluetun_data: