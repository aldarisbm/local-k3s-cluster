  namespace: oracle-db
data:
  seed.sh: |
    #!/bin/sh
    echo "Waiting for Oracle DB to be ready..."
    until echo "SELECT 1 FROM DUAL;" | sqlplus -s appuser/apppassword123@//localhost:1521/XEPDB1 2>&1 | grep -q "^[[:space:]]*1$"; do
      echo "  DB not ready yet, retrying in 15s..."
      sleep 15
    done
    echo "DB is up. Seeding demo data..."

    sqlplus -s appuser/apppassword123@//localhost:1521/XEPDB1 << 'SQLEOF'
    BEGIN
      EXECUTE IMMEDIATE 'DROP TABLE demo_users';
    EXCEPTION
      WHEN OTHERS THEN NULL;
    END;
    /

    CREATE TABLE demo_users (
      id                   NUMBER GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
      full_name            VARCHAR2(100),
      email                VARCHAR2(150),
      phone                VARCHAR2(20),
      address_line1        VARCHAR2(150),
      address_line2        VARCHAR2(100),
      city                 VARCHAR2(100),
      state                VARCHAR2(50),
      zip                  VARCHAR2(10),
      country              VARCHAR2(50),
      date_of_birth        DATE,
      ssn                  VARCHAR2(11),
      drivers_license      VARCHAR2(20),
      passport_no          VARCHAR2(20),
      credit_card          VARCHAR2(19),
      cc_exp               VARCHAR2(7),
      cc_cvv               VARCHAR2(4),
      bank_account         VARCHAR2(20),
      bank_routing         VARCHAR2(9),
      employer             VARCHAR2(150),
      job_title            VARCHAR2(100),
      annual_salary        NUMBER(10,2),
      ip_address           VARCHAR2(15),
      mothers_maiden_name  VARCHAR2(100)
    );

