apiVersion: v1
kind: Secret
metadata:
  name: oracle-db-secret
  namespace: oracle-db
type: Opaque
stringData:
  # Password for the built-in SYS and SYSTEM accounts.
  # ORACLE_PASSWORD is required; change this before deploying.
  ORACLE_PASSWORD: "dummypassword123"
  # Optional: creates an extra app-level user (APPUSER/APPUSER_PASSWORD).
  # Remove these two lines if you don't need a separate app user.
  APP_USER: "appuser"
  APP_USER_PASSWORD: "apppassword123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-db
  namespace: oracle-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: oracle-db
  template:
    metadata:
      labels:
        app: oracle-db
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: oracle-cleanup
          image: busybox
          command:
            - sh
            - -c
            - |
              find /opt/oracle/oradata -name "lk*" -delete 2>/dev/null
              find /opt/oracle/oradata -name "*.lck" -delete 2>/dev/null
              rm -f /opt/oracle/oradata/.oracle_lock 2>/dev/null
              echo "lock cleanup done"
          volumeMounts:
            - name: oracle-data
              mountPath: /opt/oracle/oradata
      containers:
        - name: oracle-db
          image: gvenzl/oracle-xe:21-slim
          command:
            - /bin/sh
            - -c
            - |
              # Clean stale Oracle SGA/semaphores from previous crash in same pod IPC namespace
              ipcs -m 2>/dev/null | awk 'NR>3 {print $2}' | while read id; do ipcrm -m "$id" 2>/dev/null; done
              ipcs -s 2>/dev/null | awk 'NR>3 {print $2}' | while read id; do ipcrm -s "$id" 2>/dev/null; done
              exec /opt/oracle/container-entrypoint.sh
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "shutdown immediate;" | sqlplus -s / as sysdba
                    lsnrctl stop
          ports:
            - containerPort: 1521
              name: oracle
          env:
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-db-secret
                  key: ORACLE_PASSWORD
            - name: APP_USER
              valueFrom:
                secretKeyRef:
                  name: oracle-db-secret
                  key: APP_USER
            - name: APP_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-db-secret
                  key: APP_USER_PASSWORD
          volumeMounts:
            - name: oracle-data
              mountPath: /opt/oracle/oradata
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - healthcheck.sh
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 20
      volumes:
        - name: oracle-data
          persistentVolumeClaim:
            claimName: oracle-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oracle-db-pvc
  namespace: oracle-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: oracle-db
  namespace: oracle-db
spec:
  selector:
    app: oracle-db
  ports:
    - name: oracle
      port: 1337
      targetPort: 1521
  type: ClusterIP
