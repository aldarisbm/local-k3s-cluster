apiVersion: apps/v1
kind: Deployment
metadata:
  name: oracle-db
  namespace: oracle-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: oracle-db
  template:
    metadata:
      labels:
        app: oracle-db
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: oracle-db
          image: gvenzl/oracle-xe:21-slim-faststart
          ports:
            - containerPort: 1521
              name: oracle
          env:
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-db-secret
                  key: ORACLE_PASSWORD
            - name: APP_USER
              valueFrom:
                secretKeyRef:
                  name: oracle-db-secret
                  key: APP_USER
            - name: APP_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: oracle-db-secret
                  key: APP_USER_PASSWORD
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - healthcheck.sh
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 10

        - name: db-seeder
          image: gvenzl/oracle-xe:21-slim-faststart
          command:
            - /bin/sh
            - /scripts/seed.sh
          volumeMounts:
            - name: seed-scripts
              mountPath: /scripts

      volumes:
        - name: seed-scripts
          configMap:
            name: oracle-seed
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: oracle-db
  namespace: oracle-db
spec:
  selector:
    app: oracle-db
  ports:
    - name: oracle
      port: 1337
      targetPort: 1521
  type: ClusterIP
