apiVersion: v1
kind: Secret
metadata:
  name: oracle-db-secret
  namespace: oracle-db
type: Opaque
stringData:
  ORACLE_PASSWORD: "dummypassword123"
  APP_USER: "appuser"
  APP_USER_PASSWORD: "apppassword123"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oracle-seed
  namespace: oracle-db
data:
  seed.sh: |
    #!/bin/sh
    echo "Waiting for Oracle DB to be ready..."
    until echo "SELECT 1 FROM DUAL;" | sqlplus -s appuser/apppassword123@//localhost:1521/XEPDB1 2>&1 | grep -q "^         1"; do
      echo "  DB not ready yet, retrying in 15s..."
      sleep 15
    done
    echo "DB is up. Seeding demo data..."

    sqlplus -s appuser/apppassword123@//localhost:1521/XEPDB1 << 'SQLEOF'
    -- Drop if exists (idempotent reseeds on pod restart since no PVC)
    BEGIN
      EXECUTE IMMEDIATE 'DROP TABLE demo_users';
    EXCEPTION
      WHEN OTHERS THEN NULL;
    END;
    /

    CREATE TABLE demo_users (
      id             NUMBER GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
      full_name      VARCHAR2(100),
      email          VARCHAR2(150),
      phone          VARCHAR2(20),
      address        VARCHAR2(250),
      city           VARCHAR2(100),
      state          VARCHAR2(50),
      zip            VARCHAR2(10),
      ssn            VARCHAR2(11),
      credit_card    VARCHAR2(19),
      cc_exp         VARCHAR2(7),
      cc_cvv         VARCHAR2(4),
      date_of_birth  DATE
    );

    INSERT INTO demo_users (full_name, email, phone, address, city, state, zip, ssn, credit_card, cc_exp, cc_cvv, date_of_birth)
    VALUES ('James R. Holloway', 'james.holloway@example.com', '555-302-4891', '4821 Elm Street', 'Austin', 'TX', '78701', '523-74-9012', '4532 1234 5678 9010', '09/27', '482', TO_DATE('1985-03-14', 'YYYY-MM-DD'));

