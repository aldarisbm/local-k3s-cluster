apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oracle-db
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aldarisbm/local-k3s-cluster.git
    targetRevision: HEAD
    path: apps/oracle-db
  destination:
    server: https://kubernetes.default.svc
    namespace: oracle-db
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
