---
apiVersion: v1
kind: Namespace
metadata:
  name: external-services
---
# ─── Plex (10.0.0.51:32400) ───────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: external-services
spec:
  ports:
    - name: http
      port: 32400
      targetPort: 32400
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: plex
  namespace: external-services
  labels:
    kubernetes.io/service-name: plex
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 32400
endpoints:
  - addresses:
      - 10.0.0.51
    conditions: {}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plex
  namespace: external-services
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: plex.joseberr.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plex
                port:
                  number: 32400
---
# ─── Downloader (10.0.0.52) ───────────────────────────────────────────────────
# Update port below to match your download manager (e.g. 8080 for qBittorrent, 9091 for Transmission)
apiVersion: v1
kind: Service
metadata:
  name: downloader
  namespace: external-services
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: downloader
  namespace: external-services
  labels:
    kubernetes.io/service-name: downloader
addressType: IPv4
ports:
  - name: http
    protocol: TCP
    port: 8080
endpoints:
  - addresses:
      - 10.0.0.52
    conditions: {}
---
